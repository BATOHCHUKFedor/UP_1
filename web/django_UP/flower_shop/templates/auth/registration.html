{% extends "base.html" %}
{% load static %}

{% block title_name %}
Регистрация
{% endblock %}

{% block content %}
<div class="content-box" style="max-width: 450px; margin: 0 auto;">
    <h1>Регистрация</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <div style="display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap;">
        <a href="{% url 'login_page' %}" class="btn btn-back">Авторизоваться</a>
        <a href="{% url 'info_view' %}" class="btn btn-back">← Назад</a>
    </div>
</div>
{% endblock %}
