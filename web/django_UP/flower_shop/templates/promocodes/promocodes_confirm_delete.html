{% extends "base.html" %}
{% load static %}

{% block title_name %}
Удаление промокода
{% endblock %}

{% block content %}
        <div class="content-box">
            <h1>Удалить промокод «{{ promocode.code }}»</h1>
            <p style="margin-bottom: 20px;">Вы уверены? Промокод перестанет действовать для всех будущих заказов.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-delete">Удалить</button>
                <a href="{% url 'promocodes_list' %}" class="btn btn-back">Отмена</a>
            </form>
        </div>
{% endblock %}
