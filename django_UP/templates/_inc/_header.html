<header style="display: flex; justify-content: space-between; align-items: center; padding-right: 10; padding-left: 10;">
        <div class="container header-inner">
            <a href="{% url 'main_view' %}" class="logo">Бутон</a>
            <div class="d-flex gap-2">
                {% if user.is_authenticated %}
                <a href="{% url "logout_page" %}" class="btn btn-outline-secondary btn-sm">Выйти</a>
                {% else %}
                <a href="{% url "login_page" %}" class="btn btn-outline-success btn-sm">Войти</a>
                <a href="{% url "registration_page" %}" class="btn btn-outline-primary btn-sm">Регистрация</a>
                {% endif %}
            </div>
            <nav>
                <a href="{% url 'main_view' %}" class="active">Главная</a>
                <div class="dropdown">
                    <span>О компании</span>
                    <div class="dropdown-menu">
                        <a href="{% url 'contacts_view' %}">Контакты</a>
                        <a href="{% url 'our_whereabouts_view' %}">Как нас найти</a>
                    </div>
                </div>
                <div class="dropdown">
                    <span>Товары</span>
                    <div class="dropdown-menu">
                        <a href="{% url 'categories_view' %}">Категории и коллекции</a>
                        <a href="{% url 'all_products_view' %}">Все товары</a>
                    </div>
                </div>
                <a href="{% url 'cart_view' %}">Корзина</a>
            </nav>
        </div>
    </header>
